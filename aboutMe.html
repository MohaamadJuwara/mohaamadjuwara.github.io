    <title>About Me - Mohaamad Juwara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            color: white;
            line-height: 1.6;
            padding: 20px;
        }
        
        nav {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 10px;
        }
        
        .nav-menu {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
        
        .hero-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        
        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            margin-bottom: 20px;
        }
        
        .hero-title {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .hero-subtitle {
            font-size: 1.2rem;
            color: #ffed4e;
        }
        
        .content-section {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .section-title {
            font-size: 2rem;
            color: #ffd700;
            margin: 30px 0 20px 0;
            text-align: center;
        }
        
        .about-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .about-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .card-title {
            font-size: 1.3rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .card-content {
            font-size: 1rem;
            line-height: 1.7;
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .skill-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .cta-section {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin: 30px 0;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .cta-title {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .cta-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        .cta-button {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
        }
        
        /* Simple mobile responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .hero-title {
                font-size: 2rem;
            }
            
            .hero-subtitle {
                font-size: 1rem;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .nav-menu {
                flex-direction: column;
                gap: 10px;
            }
            
            .nav-menu a {
                text-align: center;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .hero-title {
                font-size: 1.8rem;
            }
            
            .section-title {
                font-size: 1.3rem;
            }
            
            .about-card {
                padding: 20px;
            }
            
            .skills-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>
