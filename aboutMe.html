    <title>About Me - Mohaamad Juwara</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* About Me page specific styling */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            color: white !important;
            text-align: center !important;
            padding: 0 !important;
            margin: 0 !important;
            font-family: 'Inter', sans-serif !important;
            min-height: 100vh !important;
            overflow-x: hidden !important;
        }
        
        /* Hero Section */
        .hero-section {
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            box-sizing: border-box;
        }
        
        .profile-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin: 0 auto 2rem;
            display: block;
            object-fit: cover;
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ff6b6b, #4ecdc4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease infinite;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        @keyframes gradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .hero-subtitle {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 2rem;
            font-weight: 300;
        }
        
        /* Navigation */
        nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            backdrop-filter: blur(10px);
            width: 100%;
            box-sizing: border-box;
        }
        
        .nav-menu {
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin: 0;
            padding: 0;
        }
        
        .nav-menu li {
            margin: 0;
            padding: 0;
        }
        
        .nav-menu li a {
            text-decoration: none;
            color: white !important;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            display: block;
        }
        
        .nav-menu li a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffd700 !important;
        }
        
        /* Content Sections */
        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
            box-sizing: border-box;
        }
        
        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-bottom: 3rem;
        }
        
        .about-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }
        
        .about-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        
        .card-title {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        .card-content {
            line-height: 1.8;
            font-size: 1.1rem;
            color: white !important;
        }
        
        /* Skills Section */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .skill-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            color: white !important;
        }
        
        .skill-item:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }
        
        /* CTA Section */
        .cta-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            margin: 3rem 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .cta-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 1rem;
        }
        
        .cta-text {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: white !important;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white !important;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 25px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }
        
        .cta-button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
            color: white !important;
        }
        
        /* Enhanced Mobile Responsiveness */
        @media (max-width: 1200px) {
            .content-section {
                max-width: 100%;
                padding: 2rem 1rem;
            }
        }
        
        @media (max-width: 991px) {
            .about-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            
            .hero-title {
                font-size: 2.5rem;
            }
            
            .section-title {
                font-size: 2rem;
            }
            
            .nav-menu {
                flex-direction: column;
                gap: 1rem;
            }
            
            .hero-section {
                padding: 3rem 1rem;
            }
            
            .profile-image {
                width: 150px;
                height: 150px;
            }
            
            .content-section {
                padding: 2rem 1rem;
            }
        }
        
        @media (max-width: 767px) {
            .hero-title {
                font-size: 2rem;
            }
            
            .hero-subtitle {
                font-size: 1.2rem;
            }
            
            .section-title {
                font-size: 1.8rem;
            }
            
            .content-section {
                padding: 2rem 1rem;
            }
            
            .about-card {
                padding: 1.5rem;
            }
            
            .card-title {
                font-size: 1.3rem;
            }
            
            .card-content {
                font-size: 1rem;
            }
            
            .skills-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 1rem;
            }
            
            .cta-section {
                padding: 2rem 1rem;
                margin: 2rem 0;
            }
            
            .cta-title {
                font-size: 1.5rem;
            }
            
            .cta-text {
                font-size: 1rem;
            }
            
            .cta-button {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }
            
            .hero-section {
                padding: 2rem 1rem;
            }
            
            .profile-image {
                width: 120px;
                height: 120px;
            }
        }
        
        @media (max-width: 575px) {
            .hero-title {
                font-size: 1.8rem;
            }
            
            .hero-subtitle {
                font-size: 1.1rem;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .content-section {
                padding: 1.5rem 0.5rem;
            }
            
            .about-card {
                padding: 1rem;
            }
            
            .card-title {
                font-size: 1.2rem;
            }
            
            .card-content {
                font-size: 0.9rem;
                line-height: 1.6;
            }
            
            .skills-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            
            .skill-item {
                padding: 0.8rem;
                font-size: 0.9rem;
            }
            
            .cta-section {
                padding: 1.5rem 0.5rem;
                margin: 1.5rem 0;
            }
            
            .cta-title {
                font-size: 1.3rem;
            }
            
            .cta-text {
                font-size: 0.9rem;
            }
            
            .cta-button {
                padding: 0.7rem 1.2rem;
                font-size: 0.8rem;
            }
            
            .hero-section {
                padding: 2rem 0.5rem;
            }
            
            .profile-image {
                width: 100px;
                height: 100px;
            }
        }
        
        @media (max-width: 479px) {
            .hero-title {
                font-size: 1.5rem;
            }
            
            .hero-subtitle {
                font-size: 1rem;
            }
            
            .section-title {
                font-size: 1.3rem;
            }
            
            .content-section {
                padding: 1rem 0.25rem;
            }
            
            .about-card {
                padding: 0.8rem;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-content {
                font-size: 0.85rem;
                line-height: 1.5;
            }
            
            .skills-grid {
                gap: 0.6rem;
            }
            
            .skill-item {
                padding: 0.6rem;
                font-size: 0.85rem;
            }
            
            .cta-section {
                padding: 1rem 0.25rem;
                margin: 1rem 0;
            }
            
            .cta-title {
                font-size: 1.1rem;
            }
            
            .cta-text {
                font-size: 0.85rem;
            }
            
            .cta-button {
                padding: 0.6rem 1rem;
                font-size: 0.75rem;
            }
            
            .hero-section {
                padding: 1.5rem 0.25rem;
            }
            
            .profile-image {
                width: 80px;
                height: 80px;
            }
        }
        
        @media (max-width: 359px) {
            .hero-title {
                font-size: 1.3rem;
            }
            
            .hero-subtitle {
                font-size: 0.9rem;
            }
            
            .section-title {
                font-size: 1.1rem;
            }
            
            .content-section {
                padding: 0.8rem 0.1rem;
            }
            
            .about-card {
                padding: 0.6rem;
            }
            
            .card-title {
                font-size: 1rem;
            }
            
            .card-content {
                font-size: 0.8rem;
                line-height: 1.4;
            }
            
            .skills-grid {
                gap: 0.5rem;
            }
            
            .skill-item {
                padding: 0.5rem;
                font-size: 0.8rem;
            }
            
            .cta-section {
                padding: 0.8rem 0.1rem;
                margin: 0.8rem 0;
            }
            
            .cta-title {
                font-size: 1rem;
            }
            
            .cta-text {
                font-size: 0.8rem;
            }
            
            .cta-button {
                padding: 0.5rem 0.8rem;
                font-size: 0.7rem;
            }
            
            .hero-section {
                padding: 1rem 0.1rem;
            }
            
            .profile-image {
                width: 70px;
                height: 70px;
            }
        }
        
        /* Landscape Orientation for Mobile */
        @media (orientation: landscape) and (max-height: 600px) {
            .hero-section {
                padding: 1rem 2rem;
            }
            
            .profile-image {
                width: 80px;
                height: 80px;
                margin: 0 auto 1rem;
            }
            
            .hero-title {
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
            }
            
            .hero-subtitle {
                font-size: 1rem;
                margin-bottom: 1rem;
            }
            
            .content-section {
                padding: 1rem 2rem;
            }
        }
        
        /* Touch Device Optimizations */
        @media (hover: none) and (pointer: coarse) {
            .nav-menu li a {
                min-height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .cta-button {
                min-height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .skill-item {
                min-height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
        
        /* High DPI Displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .profile-image {
                border-width: 2px;
            }
        }
        
        /* Ensure content is always visible */
        * {
            box-sizing: border-box !important;
        }
        
        .content-section,
        .about-grid,
        .skills-grid,
        .cta-section {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        /* Fix any potential overflow issues */
        body, html {
            overflow-x: hidden !important;
            width: 100% !important;
        }
    </style>
