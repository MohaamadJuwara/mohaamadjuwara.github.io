<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Contact - Mohaamad Juwara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #33CCCC;
            animation: color 9s infinite linear;
            text-align: center;
            padding: 2em;
            color: white;
        }
        
        /* Color animation for background */
        @keyframes color {
            0%   { background: #33CCCC; }
            20%  { background: #33CC36; }
            40%  { background: #B8CC33; }
            60%  { background: #FCCA00; }
            80%  { background: #33CC36; }
            100% { background: #33CCCC; }
        }
        
        /* Navigation */
        nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .container-fluid-md-sm {
            width: 100%;
            padding: 0 1rem;
        }
        
        .d-flex {
            display: flex;
            align-items: center;
        }
        
        .justify-content-between {
            justify-content: space-between;
        }
        
        .nav-menu {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 0;
            padding: 0;
        }
        
        .nav-menu li {
            margin: 0;
            padding: 0;
        }
        
        .nav-menu a {
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            display: block;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-menu a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffd700;
        }
        
        .img-fluid {
            max-width: 100%;
            height: auto;
        }
        
        /* Contact Section */
        .contact {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 3rem;
            margin: 2rem auto;
            max-width: 600px;
            border: 2px solid #ea4020;
            color: #333;
        }
        
        .contactcleur {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }
        
        .contact p {
            margin: 1.5rem 0;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .contact a {
            color: #ea4020;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            background: rgba(234, 64, 32, 0.1);
            transition: all 0.3s ease;
            display: inline-block;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .contact a:hover {
            background: #ea4020;
            color: white;
            text-decoration: none;
        }
        
        /* Mobile-first responsive design */
        @media (max-width: 768px) {
            body {
                padding: 1em;
            }
            
            .contact {
                margin: 1rem;
                padding: 2rem;
            }
            
            .contactcleur {
                font-size: 1.5rem;
            }
            
            .contact p {
                font-size: 1rem;
                margin: 1rem 0;
            }
            
            .nav-menu {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-menu a {
                text-align: center;
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 0.5em;
            }
            
            .contact {
                margin: 0.5rem;
                padding: 1.5rem;
            }
            
            .contactcleur {
                font-size: 1.3rem;
            }
            
            .contact p {
                font-size: 0.9rem;
                margin: 0.8rem 0;
            }
            
            .contact a {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 360px) {
            body {
                padding: 0.25em;
            }
            
            .contact {
                margin: 0.25rem;
                padding: 1rem;
            }
            
            .contactcleur {
                font-size: 1.1rem;
            }
            
            .contact p {
                font-size: 0.8rem;
                margin: 0.6rem 0;
            }
            
            .contact a {
                padding: 0.3rem 0.6rem;
                font-size: 0.8rem;
            }
        }
        
        /* Force display on mobile */
        @media (max-width: 768px) {
            nav,
            .contact {
                display: block !important;
                visibility: visible !important;
                opacity: 1 !important;
            }
        }
        
        /* Debug borders for mobile */
        @media (max-width: 768px) {
            nav,
            .contact {
                border: 2px solid rgba(255, 255, 255, 0.5) !important;
                background: rgba(0, 0, 0, 0.3) !important;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container-fluid-md-sm d-flex justify-content-between">
            <ul class="nav-menu d-flex text-dark">
                <li>
                    <img class="img-fluid" width="90px" src="img/logo m-16.png" alt="Logo">
                </li>
                <li>
                    <a href="index.html" class="text-dark"> Home</a>
                </li>
                <li>
                    <a href="aboutMe.html" class="text-dark">AboutMe</a>
                </li>
                <li>
                    <a href="projects.html" class="text-dark">Projects</a>
                </li>
                <li>
                    <a href="contact.html" class="text-white">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid-sm-md contact align-items-center">
        <h3 class="contactcleur">U kunt me bereiken via</h3>
        <p>Email: <a href="mailto:mohaamadjuwara@yahoo.com">Click hier!</a></p>
        <p>Telefoon nummer: <a href="tel:+31638186372">Bel mij</a></p>
        <p>Facebook: <a href="#">Click hier!</a></p>
        <p>Instagram: <a href="#">Click hier!</a></p>
        <p>Twitter: <a href="#">Click hier!</a></p>
    </div>

    <script src="main.js"></script>
</body>
</html>
