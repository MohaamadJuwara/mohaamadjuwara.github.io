<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Portfolio - Mohaamad Juwara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #33CCCC;
            animation: color 9s infinite linear;
            text-align: center;
            padding: 2em;
            color: white;
        }
        
        /* Color animation for background */
        @keyframes color {
            0%   { background: #33CCCC; }
            20%  { background: #33CC36; }
            40%  { background: #B8CC33; }
            60%  { background: #FCCA00; }
            80%  { background: #33CC36; }
            100% { background: #33CCCC; }
        }
        
        /* Navigation */
        nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .container-fluid-sm {
            width: 100%;
            padding: 0 1rem;
        }
        
        .d-flex {
            display: flex;
            align-items: center;
        }
        
        .justify-content-between {
            justify-content: space-between;
        }
        
        .nav-menu {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 0;
            padding: 0;
        }
        
        .nav-menu li {
            margin: 0;
            padding: 0;
        }
        
        .nav-menu a {
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            display: block;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-menu a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffd700;
        }
        
        .img-fluid {
            max-width: 100%;
            height: auto;
        }
        
        /* Main Content */
        section {
            padding: 2rem 0;
        }
        
        .container-fluid {
            width: 100%;
            padding: 0 1rem;
        }
        
        .home-text {
            width: 100%;
            max-width: 450px;
            text-align: left;
            margin-bottom: 2rem;
        }
        
        .home-text span {
            font-size: 22px;
            text-transform: capitalize;
            font-weight: 600;
            color: #333333;
            display: block;
            margin-bottom: 1rem;
        }
        
        .home-text h1 {
            font-size: 60px;
            padding: 20px 0;
            color: #1f050599;
            position: relative;
            margin-bottom: 1rem;
        }
        
        .home-text h1::after {
            content: '';
            width: 150px;
            height: 4px;
            background: #ea4020;
            position: absolute;
            left: 0;
            bottom: 0;
        }
        
        .home-text h2 {
            font-size: 30px;
            font-weight: 500;
            padding: 20px 0;
            color: #333333;
            margin-bottom: 1rem;
        }
        
        .home-text p {
            font-size: 16px;
            color: #333333;
            line-height: 30px;
            padding-bottom: 40px;
            margin-bottom: 1rem;
        }
        
        .meContact {
            text-decoration: none;
            font-size: 16px;
            text-transform: uppercase;
            color: #ffffff;
            background: #ea4020;
            padding: 15px 30px;
            font-weight: 600;
            border-radius: 5px;
            display: inline-block;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .meContact:hover {
            background: #d1381a;
            color: white;
            text-decoration: none;
        }
        
        /* Animated character styling */
        .animate-charcter {
            text-transform: uppercase;
            background-image: linear-gradient(
                -225deg,
                red 0%,
                darkblue 29%,
                azure 67%,
                darkgreen 100%
            );
            background-size: auto auto;
            background-clip: border-box;
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textclip 2s linear infinite;
            display: inline-block;
            font-size: 190px;
        }
        
        @keyframes textclip {
            to {
                background-position: 200% center;
            }
        }
        
        /* Image section */
        .home-img-border {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }
        
        .home-img {
            width: 100%;
            max-width: 350px;
            height: auto;
            aspect-ratio: 1;
            border: 15px solid;
            border-color: #292929;
            border-radius: 50% 50% 0% 50%;
            overflow: hidden;
            position: relative;
            margin: 0 auto;
        }
        
        .border-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Mobile-first responsive design */
        @media (max-width: 1200px) {
            .container-fluid {
                max-width: 100%;
                padding: 0 1rem;
            }
            
            .home-text h1 {
                font-size: 50px;
            }
            
            .animate-charcter {
                font-size: 160px;
            }
        }
        
        @media (max-width: 991px) {
            body {
                padding: 1.5em;
            }
            
            .home-text {
                width: 100%;
                text-align: center;
                margin-bottom: 2rem;
            }
            
            .home-text h1 {
                font-size: 45px;
            }
            
            .home-text h1::after {
                left: 50%;
                transform: translateX(-50%);
            }
            
            .home-text h2 {
                font-size: 26px;
            }
            
            .home-text span {
                font-size: 20px;
            }
            
            .home-img {
                max-width: 300px;
            }
            
            .animate-charcter {
                font-size: 140px;
            }
            
            .nav-menu {
                flex-direction: column;
                gap: 1rem;
            }
        }
        
        @media (max-width: 767px) {
            body {
                padding: 1em;
            }
            
            .container-fluid {
                max-width: 540px;
                padding: 0 0.5rem;
            }
            
            .home-text h1 {
                font-size: 40px;
            }
            
            .home-text h2 {
                font-size: 24px;
            }
            
            .home-text span {
                font-size: 18px;
            }
            
            .home-text p {
                font-size: 15px;
                line-height: 28px;
            }
            
            .meContact {
                padding: 12px 25px;
                font-size: 15px;
            }
            
            .home-img {
                max-width: 250px;
            }
            
            .animate-charcter {
                font-size: 120px;
            }
            
            .nav-menu {
                flex-direction: column;
                gap: 10px;
            }
            
            .nav-menu a {
                text-align: center;
                width: 100%;
            }
        }
        
        @media (max-width: 575px) {
            body {
                padding: 0.5em;
            }
            
            .container-fluid {
                padding: 0 0.25rem;
            }
            
            .home-text h1 {
                font-size: 32px;
            }
            
            .home-text h1::after {
                width: 120px;
                height: 3px;
            }
            
            .home-text h2 {
                font-size: 20px;
            }
            
            .home-text span {
                font-size: 16px;
            }
            
            .home-text p {
                font-size: 14px;
                line-height: 25px;
            }
            
            .meContact {
                padding: 10px 20px;
                font-size: 14px;
            }
            
            .home-img {
                max-width: 200px;
            }
            
            .animate-charcter {
                font-size: 80px;
            }
            
            .nav-menu {
                gap: 8px;
            }
        }
        
        @media (max-width: 479px) {
            body {
                padding: 0.25em;
            }
            
            .container-fluid {
                padding: 0 0.1rem;
            }
            
            .home-text h1 {
                font-size: 28px;
            }
            
            .home-text h2 {
                font-size: 18px;
            }
            
            .home-text span {
                font-size: 14px;
            }
            
            .home-text p {
                font-size: 13px;
                line-height: 22px;
            }
            
            .meContact {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            .home-img {
                max-width: 180px;
            }
            
            .animate-charcter {
                font-size: 60px;
            }
        }
        
        /* Force display on mobile */
        @media (max-width: 767px) {
            nav,
            section,
            .home-text,
            .home-img-border {
                display: block !important;
                visibility: visible !important;
                opacity: 1 !important;
            }
        }
        
        /* Debug borders for mobile */
        @media (max-width: 767px) {
            nav,
            section,
            .home-text,
            .home-img-border {
                border: 2px solid rgba(255, 255, 255, 0.5) !important;
                background: rgba(0, 0, 0, 0.3) !important;
            }
        }
    </style>
</head>
<body>
    <main>
        <nav>
            <div class="container-fluid-sm d-flex justify-content-between">
                <ul class="nav-menu d-flex text-dark">
                    <li>
                        <a href=""><img class="img-fluid" height="50px" width="50px" src="img/logo m-16.png" alt="Logo"></a>
                    </li>
                    <li>
                        <a href="index.html" class="text-white"> Home</a>
                    </li>
                    <li>
                        <a href="aboutMe.html" class="text-dark">AboutMe</a>
                    </li>
                    <li>
                        <a href="projects.html" class="text-dark">Projects</a>
                    </li>
                    <li>
                        <a href="contact.html" class="text-dark">Contact</a>
                    </li>
                </ul>
            </div>
        </nav>
        
        <section>
            <div class="container-fluid d-flex justify-content-between">
                <div class="home-text">
                    <span>Welkom, beste lezer. Mijn naam is</span>
                    <h1 class="animate-charcter">Mohaamad Juwara</h1>
                    <h2>Software <span id="type-it">Developer i.o.</span></h2>
                    <p>Student aan Roc Mondriaan Mbo-4 leerjaar 3</p>
                    <a href="contact.html" class="meContact">Contact Me</a>
                </div>
                <div class="home-img-border">
                    <div class="home-img">
                        <img class="border-img" src="./img/foto-pro.jpg" alt="Mohaamad Juwara">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
