<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobby Snake - Browser Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-page">
    <h1>Bobby Snake - Browser Demo</h1>
    <p class="subtitle">Arrow keys to move. Eat 10 apples to win. Press R to restart after game over.</p>

    <div class="hud">
      <span id="score">Score: 0 / 10</span>
      <span id="status">Playing</span>
      <button id="restart" type="button">Restart</button>
    </div>

    <canvas id="gameCanvas" width="800" height="640" aria-label="Bobby Snake game canvas"></canvas>
  </main>
  <script src="game.js"></script>
</body>
</html>
